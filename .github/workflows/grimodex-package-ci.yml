name: Grimodex package contract

on:
  pull_request:
    paths:
      - "debian/**"
      - "packaging/**"
      - ".github/workflows/grimodex-package-ci.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "debian/**"
      - "packaging/**"
      - ".github/workflows/grimodex-package-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Run static and synthetic staged-install contracts
        run: python3 packaging/tests/package_contract_test.py
      - name: Validate packaging scripts
        run: |
          python3 -m py_compile packaging/tests/package_contract_test.py
          bash -n packaging/aur/fcitx5-grimodex-bin/PKGBUILD
          bash -n packaging/aur/fcitx5-grimodex-bin/fcitx5-grimodex.install
      - name: Parse Debian metadata
        run: |
          sudo apt-get update
          sudo apt-get install --yes dpkg-dev
          dpkg-parsechangelog --show-field Source | grep -Fx fcitx5-grimodex
          dpkg-parsechangelog --show-field Version | grep -Fx 0.2.1-1
          dpkg-source --before-build .

  aur-metadata:
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate and compare AUR metadata
        run: |
          useradd --create-home builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- bash -c \
            'cd packaging/aur/fcitx5-grimodex-bin && makepkg --printsrcinfo' \
            > /tmp/generated.SRCINFO
          diff -u packaging/aur/fcitx5-grimodex-bin/.SRCINFO \
            /tmp/generated.SRCINFO
