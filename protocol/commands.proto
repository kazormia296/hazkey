syntax = "proto3";

package hazkey.commands;

option optimize_for = LITE_RUNTIME;

// Protocol v2 semantic actions. Protocol v1 procedural commands have been
// removed; their RequestEnvelope field numbers remain reserved in base.proto.
message InsertText {
    string text = 1;
}

message DeleteBackward {}
message DeleteForward {}

message MoveCursor {
    int32 offset = 1;
}

message MoveCursorToEdge {
    enum Edge {
        EDGE_UNSPECIFIED = 0;
        START = 1;
        END = 2;
    }
    Edge edge = 1;
}

message StartConversion {}

message NavigateCandidate {
    int32 delta = 1;
}

message NavigateCandidatePage {
    int32 delta = 1;
}

message ResizeSegment {
    int32 delta = 1;
}

message MoveActiveSegment {
    int32 offset = 1;
}

message ApplyLiveConversion {
    // CompositionSession revision captured when the debounce timer was
    // scheduled. A mismatch is a successful no-op, not a retryable stale
    // revision error.
    uint64 scheduled_revision = 1;
}

message CommitSelected {}
message CommitAll {}
message Cancel {}

message SelectCandidate {
    string candidate_id = 1;
    uint64 generation = 2;
}

message TransformActiveSegment {
    enum Transform {
        TRANSFORM_UNSPECIFIED = 0;
        HIRAGANA = 1;
        KATAKANA_FULLWIDTH = 2;
        KATAKANA_HALFWIDTH = 3;
        ALPHABET_FULLWIDTH = 4;
        ALPHABET_HALFWIDTH = 5;
    }
    Transform transform = 1;
}

message LifecycleEvent {
    enum Event {
        EVENT_UNSPECIFIED = 0;
        DEACTIVATE = 1;
        FOCUS_CHANGED = 2;
        CAPABILITY_CHANGED = 3;
        SECURE_INPUT_CHANGED = 4;
        SERVER_RESTARTED = 5;
    }
    Event event = 1;
    optional bool client_preedit = 2;
    optional bool secure_input = 3;
}

message ForgetCandidate {
    string candidate_id = 1;
    uint64 generation = 2;
}

message Reconvert {
    string text = 1;
    string left_context = 2;
    string right_context = 3;
    // Character counts relative to the frontend cursor. Their sum must match
    // the selected text length when replacement is requested.
    uint32 delete_before = 4;
    uint32 delete_after = 5;
}

message BeginUnicodeInput {}

message AppendUnicodeDigit {
    string digit = 1;
}

message CommitUnicodeInput {}

message UpdateSurroundingContext {
    string text = 1;
    // Unicode-scalar offset, matching the existing SetContext contract.
    uint32 anchor = 2;
}

message RestoreCheckpoint {
    bytes opaque_state = 1;
}

message HandleImeAction {
    string request_id = 1;
    uint64 expected_revision = 2;

    oneof action {
        InsertText insert_text = 10;
        DeleteBackward delete_backward = 11;
        DeleteForward delete_forward = 12;
        MoveCursor move_cursor_v2 = 13;
        MoveCursorToEdge move_cursor_to_edge = 14;
        StartConversion start_conversion = 15;
        NavigateCandidate navigate_candidate = 16;
        NavigateCandidatePage navigate_candidate_page = 17;
        ResizeSegment resize_segment = 18;
        CommitSelected commit_selected = 19;
        CommitAll commit_all = 20;
        Cancel cancel = 21;
        SelectCandidate select_candidate = 22;
        TransformActiveSegment transform_active_segment = 23;
        LifecycleEvent lifecycle_event = 24;
        ForgetCandidate forget_candidate = 25;
        Reconvert reconvert = 26;
        UpdateSurroundingContext update_surrounding_context = 27;
        RestoreCheckpoint restore_checkpoint = 28;
        BeginUnicodeInput begin_unicode_input = 29;
        AppendUnicodeDigit append_unicode_digit = 30;
        CommitUnicodeInput commit_unicode_input = 31;
        MoveActiveSegment move_active_segment = 32;
        ApplyLiveConversion apply_live_conversion = 33;
    }
}
