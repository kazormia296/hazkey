syntax = "proto3";

package hazkey.config;

option optimize_for = LITE_RUNTIME;

message FileHash {
    enum ConfigFileType {
        CONFIG_MAIN = 0;
        INPUT_TABLE = 1;
    }

    string name = 1;
    string sha256sum = 2;
    ConfigFileType type = 3;
}

message Keymap {
    string name = 1;
    bool is_built_in = 2;
    string filename = 3;
}

message InputTable {
    string name = 1;
    bool is_built_in = 2;
    string filename = 3;
}

message BackendDevice {
    string name = 1;
    string desc = 2;
}

message Profile {
    enum GrimodexScopeMode {
        GRIMODEX_ONLY = 0;
        GRIMODEX_OFF = 1;
        GRIMODEX_ALL_APPLICATIONS = 2;
    }

    enum AutoConvertMode {
        AUTO_CONVERT_MODE_UNSPECIFIED = 0;
        AUTO_CONVERT_DISABLED = 1;
        AUTO_CONVERT_ALWAYS = 2;
        AUTO_CONVERT_FOR_MULTIPLE_CHARS = 3;
    }

    enum AuxTextMode {
        AUX_TEXT_MODE_UNSPECIFIED = 0;
        AUX_TEXT_DISABLED = 1;
        AUX_TEXT_SHOW_ALWAYS = 2;
        AUX_TEXT_SHOW_WHEN_CURSOR_NOT_AT_END = 3;
    }

    enum SuggestionListMode {
        SUGGESTION_LIST_MODE_UNSPECIFIED = 0;
        SUGGESTION_LIST_DISABLED = 1;
        SUGGESTION_LIST_SHOW_NORMAL_RESULTS = 2;
        SUGGESTION_LIST_SHOW_PREDICTIVE_RESULTS = 3;
    }

    message SpecialConversionMode {
        optional bool comma_separated_number = 1;
        optional bool mail_domain = 2;
        optional bool calendar = 3;
        optional bool time = 4;
        optional bool roman_typography = 5;
        optional bool unicode_codepoint = 6;
        optional bool hazkey_version = 7;
        optional bool halfwidth_katakana = 50;
        optional bool extended_emoji = 51;
    }

    message EnabledKeymap {
        optional string name = 1;
        optional bool is_built_in = 2;
        optional string filename = 3;
    }

    message EnabledInputTable {
        optional string name = 1;
        optional bool is_built_in = 2;
        optional string filename = 3;
    }

    optional string server_version = 4;

    string profile_name = 5;
    string profile_id = 6;

    optional bool use_default_input_ui_settings = 10;
    optional AutoConvertMode auto_convert_mode = 11;
    optional AuxTextMode aux_text_mode = 12;
    optional SuggestionListMode suggestion_list_mode = 13;
    optional bool use_rich_suggestion = 14;
    optional int32 num_suggestions = 15;
    // 0 applies live conversion immediately. If omitted, the server uses
    // 228 ms. Values above 1000 ms are clamped by the server.
    optional uint32 live_conversion_delay_msec = 16;

    optional bool use_default_conversion_ui_settings = 20;
    optional int32 num_candidates_per_page = 21;
    optional bool use_rich_candidates = 22;

    optional bool use_default_history_settings = 30;
    optional bool use_profile_independent_history = 31;
    optional bool use_input_history = 32;
    optional bool stop_store_new_history = 23;

    optional bool use_default_special_conversion_settings = 40;
    optional SpecialConversionMode special_conversion_mode = 41;

    optional bool use_default_keymap_settings = 50;
    repeated EnabledKeymap enabled_keymaps = 51;

    optional bool use_default_table_settings = 55;
    repeated EnabledInputTable enabled_tables = 56;

    optional string submode_entry_point_chars = 60;

    optional bool use_default_zenzai_settings = 100;
    optional bool zenzai_enable = 101;
    optional int32 zenzai_infer_limit = 102;
    optional bool zenzai_contextual_mode = 103;
    optional bool use_zenzai_custom_weight = 105;
    optional string zenzai_weight_path = 106;
    optional string zenzai_backend_device_name = 107;

    optional string zenzai_profile = 120;
    optional string zenzai_topic = 121;
    optional string zenzai_style = 122;
    optional string zenzai_preference = 123;

    optional GrimodexScopeMode grimodex_scope_mode = 130;
}

// Request messages

message GetConfig {}

message SetConfig {
    repeated FileHash file_hashes = 1;
    repeated Profile profiles = 2;
}

message GetDefaultProfile {}

message ClearAllHistory {
    string profile_id = 1;
}

message ReloadZenzaiModel {}

enum UserDictionaryLayer {
    USER_DICTIONARY_LAYER_UNSPECIFIED = 0;
    SYSTEM = 1;
    PERSONAL = 2;
    PROJECT = 3;
    TEMPORARY = 4;
}

message UserDictionaryEntry {
    string id = 1;
    string reading = 2;
    string surface = 3;
    string part_of_speech = 4;
    UserDictionaryLayer layer = 5;
}

message ListUserDictionary {}

message AddUserDictionaryEntry {
    UserDictionaryEntry entry = 1;
}

message UpdateUserDictionaryEntry {
    UserDictionaryEntry entry = 1;
}

message RemoveUserDictionaryEntry {
    string id = 1;
}

message ImportUserDictionary {
    bytes json = 1;
    bool merge = 2;
}

message ExportUserDictionary {}

// Response messages

message GrimodexDiagnostics {
    enum ScopeReason {
        SCOPE_REASON_UNSPECIFIED = 0;
        ALLOWED_GRIMODEX = 1;
        ALLOWED_ALL_APPLICATIONS = 2;
        DISABLED = 3;
        SECURE_INPUT = 4;
        UNKNOWN_PROGRAM = 5;
        OTHER_PROGRAM = 6;
    }

    bool watcher_active = 1;
    bool consumer_registered = 2;
    string snapshot_status = 3;
    uint64 generation = 4;
    optional string active_project_id = 5;
    uint32 active_sessions = 6;
    optional string program = 7;
    optional string frontend = 8;
    bool secure_input = 9;
    bool integration_allowed = 10;
    ScopeReason scope_reason = 11;
}

message ZenzaiRuntimeDiagnostics {
    enum Status {
        STATUS_UNSPECIFIED = 0;
        READY = 1;
        MODEL_LOAD_VERIFIED = 2;
        PROFILE_DISABLED = 3;
        POLICY_DISABLED = 4;
        BACKEND_UNAVAILABLE = 5;
        MODEL_MISSING = 6;
        MODEL_LOAD_FAILED = 7;
    }

    Status status = 1;
    bool model_load_verified = 2;
    // Counts primary conversion requests made with a Zenzai model URL. The
    // pinned converter does not expose per-candidate AI evaluation outcomes.
    uint64 zenzai_enabled_request_count = 3;
    uint64 model_load_failure_count = 4;
    optional uint64 last_zenzai_request_unix_millis = 5;
    string detail = 6;
}

message CurrentConfig {
    repeated FileHash file_hashes = 1;
    repeated Profile profiles = 2;
    repeated Keymap available_keymaps = 3;
    repeated InputTable available_tables = 4;
    repeated BackendDevice available_zenzai_backend_devices = 7;
    bool zenzai_model_available = 8;
    string zenzai_model_path = 9;
    string xdg_config_home_path = 6;
    GrimodexDiagnostics grimodex_diagnostics = 20;
    ZenzaiRuntimeDiagnostics zenzai_runtime_diagnostics = 21;
}

message UserDictionaryResult {
    repeated UserDictionaryEntry entries = 1;
    bytes exported_json = 2;
}
